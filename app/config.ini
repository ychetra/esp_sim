# RFID Cut Station - Machine Configuration
# Each Windows machine has its own copy of this file.
# Edit via browser Settings or edit this file directly.

[machine]
name = Cut Station 1

[database]
# Mode: sqlserver (production) or sqlite (testing only)
mode = sqlserver

# SQL Server connection
host = 192.168.1.100
port = 1433
database = FactoryDB_Line1
user = sa
password = YourPassword123

# Table and column mapping (match your existing DB schema)
table = tCutBundCard
card_column = CardNo
size_column = SizeName
qty_column = CutQty

[serial]
# COM port for ESP32 (leave blank for auto-detect in dashboard)
port =
baud = 115200

[dashboard]
web_port = 8080
