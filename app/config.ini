# RFID Cut Station - Machine Configuration
# Each Windows machine has its own copy of this file.
# Edit this to match your machine's SQL Server + COM port.

[machine]
# Name for this station (shows on dashboard header)
name = Cut Station 1

[database]
# Mode: sqlite (for testing) or sqlserver (production)
mode = sqlite

# SQL Server connection (only used when mode = sqlserver)
host = 192.168.1.100
port = 1433
database = FactoryDB_Line1
user = sa
password = YourPassword123

# Table and column mapping (match your existing DB schema)
table = tCutBundCard
card_column = CardNo
size_column = SizeName
qty_column = CutQty

[serial]
# COM port for ESP32 (leave blank for auto-detect in dashboard)
# Windows examples: COM3, COM4, COM5
port =
baud = 115200

[dashboard]
# Web dashboard port
web_port = 8080
